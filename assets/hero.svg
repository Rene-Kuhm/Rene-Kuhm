<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="René Kuhm — Full-Stack Developer">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="25%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="55%" stop-color="#0a0f1c"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <!-- Ambient glows -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>

    <!-- Name gradient -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f2937" opacity=".55"/>
    </pattern>

    <!-- Glass card -->
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity=".35"/>
    </linearGradient>

    <!-- Filter for subtle blur -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes blink   { 0%,49%{opacity:1} 50%,100%{opacity:0} }
      @keyframes ping    { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.5);opacity:0} }
      @keyframes pulse-r { 0%,100%{r:6;opacity:1} 50%{r:8;opacity:.6} }
      @keyframes drift   { 0%,100%{transform:translate(0,0)} 50%{transform:translate(0,-4px)} }
      @keyframes drift2  { 0%,100%{transform:translate(0,0)} 50%{transform:translate(0,4px)} }
      @keyframes orbit   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes flow    { to { stroke-dashoffset: -24 } }
      @keyframes slide   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
      @keyframes reveal  { from{stroke-dashoffset:300} to{stroke-dashoffset:0} }
      @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:1} }

      .blink   { animation: blink 1s step-end infinite; }
      .pulse   { animation: pulse-r 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      .ping    { animation: ping 2s cubic-bezier(0,0,.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      .drift   { animation: drift 5s ease-in-out infinite; }
      .drift2  { animation: drift2 5s ease-in-out infinite .8s; }
      .orbit   { transform-origin: 980px 170px; animation: orbit 30s linear infinite; }
      .flow    { stroke-dasharray: 6 6; animation: flow 2.4s linear infinite; }
      .reveal-1 { animation: slide .55s ease .05s both; }
      .reveal-2 { animation: slide .55s ease .20s both; }
      .reveal-3 { animation: slide .55s ease .40s both; }
      .reveal-4 { animation: slide .55s ease .60s both; }
      .reveal-5 { animation: slide .55s ease .80s both; }
      .draw     { stroke-dasharray: 300; animation: reveal 1.6s ease-out .3s both; }
      .shim     { animation: shimmer 4s ease-in-out infinite; }
    </style>

    <clipPath id="cp"><rect width="1200" height="340" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#cp)">
    <!-- Layered background -->
    <rect width="1200" height="340" fill="url(#bg)"/>
    <rect width="1200" height="340" fill="url(#dots)"/>

    <!-- Ambient glows -->
    <ellipse cx="180" cy="140" rx="320" ry="180" fill="url(#glow-cyan)"/>
    <ellipse cx="980" cy="200" rx="300" ry="200" fill="url(#glow-purple)"/>
    <ellipse cx="600" cy="320" rx="400" ry="120" fill="url(#glow-amber)"/>

    <!-- Top monogram badge -->
    <g class="reveal-1" transform="translate(60, 50)">
      <rect width="44" height="44" rx="10" fill="url(#card-bg)" stroke="#1f2937" stroke-width="1"/>
      <text x="22" y="29" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#00D9FF" text-anchor="middle">RK</text>
    </g>

    <!-- Status pill -->
    <g class="reveal-2" transform="translate(118, 56)">
      <rect width="200" height="32" rx="16" fill="url(#card-bg)" stroke="#1f2937" stroke-width="1"/>
      <g transform="translate(16, 16)">
        <circle r="6" fill="#22c55e" class="ping"/>
        <circle r="4" fill="#22c55e" class="pulse"/>
      </g>
      <text x="34" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#c9d1d9" letter-spacing="1.2">AVAILABLE FOR WORK</text>
    </g>

    <!-- Top-right meta -->
    <g class="reveal-2" transform="translate(900, 56)">
      <rect width="240" height="32" rx="16" fill="url(#card-bg)" stroke="#1f2937" stroke-width="1"/>
      <text x="20" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#6b7280" letter-spacing="1">
        LA PAMPA · ARGENTINA · UTC-3
      </text>
    </g>

    <!-- Big name -->
    <g class="reveal-3">
      <text x="60" y="170" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="800" fill="url(#name-grad)" letter-spacing="-2.5">René Kuhm</text>
      <rect x="450" y="115" width="3" height="60" fill="#00D9FF" class="blink"/>
    </g>

    <!-- Accent underline -->
    <line x1="60" y1="186" x2="360" y2="186" stroke="url(#accent-line)" stroke-width="2" class="draw"/>

    <!-- Role line -->
    <g class="reveal-4">
      <text x="60" y="218" font-family="JetBrains Mono, ui-monospace, monospace" font-size="16" fill="#c9d1d9" letter-spacing="0.3">
        <tspan fill="#00D9FF">▸</tspan> Programador Full-Stack
        <tspan fill="#374151"> · </tspan>
        <tspan fill="#a78bfa">AI Agent Builder</tspan>
        <tspan fill="#374151"> · </tspan>
        <tspan fill="#fcd34d">FTTH Consultant</tspan>
      </text>
    </g>

    <!-- Tag pills -->
    <g class="reveal-5" transform="translate(60, 245)">
      <g transform="translate(0, 0)">
        <rect width="138" height="32" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1" opacity=".9"/>
        <circle cx="14" cy="16" r="3" fill="#a78bfa"/>
        <text x="26" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#c4b5fd" letter-spacing="0.5">LangChain · RAG</text>
      </g>
      <g transform="translate(150, 0)">
        <rect width="160" height="32" rx="8" fill="#0d1117" stroke="#00D9FF" stroke-width="1" opacity=".9"/>
        <circle cx="14" cy="16" r="3" fill="#00D9FF"/>
        <text x="26" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#67e8f9" letter-spacing="0.5">Next.js · Astro · Flutter</text>
      </g>
      <g transform="translate(322, 0)">
        <rect width="142" height="32" rx="8" fill="#0d1117" stroke="#fcd34d" stroke-width="1" opacity=".9"/>
        <circle cx="14" cy="16" r="3" fill="#fcd34d"/>
        <text x="26" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#fde68a" letter-spacing="0.5">FTTH · Linux · NixOS</text>
      </g>
    </g>

    <!-- Bottom command-line style status -->
    <g class="reveal-5" transform="translate(60, 305)">
      <text font-family="JetBrains Mono, monospace" font-size="11" fill="#6b7280" letter-spacing="0.5">
        <tspan fill="#22c55e">$</tspan>
        <tspan> rk </tspan>
        <tspan fill="#00D9FF">--status</tspan>
        <tspan> </tspan>
        <tspan fill="#9ca3af">→ shipping AI agents · ex-COSPEC (10y FTTH) · open to collaborations</tspan>
      </text>
    </g>

    <!-- ── RIGHT SIDE: Architecture diagram ─────────────────────── -->

    <!-- Orbit ring (decorative) -->
    <g class="orbit" stroke="#1f2937" stroke-width="1" fill="none">
      <circle cx="980" cy="170" r="135" stroke-dasharray="4 6" opacity=".45"/>
    </g>

    <!-- Connection lines (from center hub to each node) -->
    <g fill="none" stroke-width="1.5" opacity=".55">
      <line x1="980" y1="170" x2="870" y2="100" stroke="#00D9FF" class="flow"/>
      <line x1="980" y1="170" x2="1090" y2="100" stroke="#a78bfa" class="flow"/>
      <line x1="980" y1="170" x2="850" y2="200" stroke="#fcd34d" class="flow"/>
      <line x1="980" y1="170" x2="1110" y2="200" stroke="#22c55e" class="flow"/>
      <line x1="980" y1="170" x2="920" y2="270" stroke="#f87171" class="flow"/>
      <line x1="980" y1="170" x2="1040" y2="270" stroke="#06b6d4" class="flow"/>
    </g>

    <!-- Outer nodes -->
    <g class="drift">
      <g transform="translate(870, 100)">
        <circle r="22" fill="#0d1117" stroke="#00D9FF" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#00D9FF" text-anchor="middle" letter-spacing=".5">WEB</text>
      </g>
    </g>
    <g class="drift2">
      <g transform="translate(1090, 100)">
        <circle r="22" fill="#0d1117" stroke="#a78bfa" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#a78bfa" text-anchor="middle" letter-spacing=".5">AI</text>
      </g>
    </g>
    <g class="drift">
      <g transform="translate(850, 200)">
        <circle r="20" fill="#0d1117" stroke="#fcd34d" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="9" font-weight="600" fill="#fcd34d" text-anchor="middle" letter-spacing=".5">FTTH</text>
      </g>
    </g>
    <g class="drift2">
      <g transform="translate(1110, 200)">
        <circle r="22" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="8" font-weight="600" fill="#22c55e" text-anchor="middle" letter-spacing=".5">DEVOPS</text>
      </g>
    </g>
    <g class="drift">
      <g transform="translate(920, 270)">
        <circle r="20" fill="#0d1117" stroke="#f87171" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="8" font-weight="600" fill="#f87171" text-anchor="middle" letter-spacing=".5">FLUTTER</text>
      </g>
    </g>
    <g class="drift2">
      <g transform="translate(1040, 270)">
        <circle r="20" fill="#0d1117" stroke="#06b6d4" stroke-width="1.5"/>
        <text y="4" font-family="JetBrains Mono" font-size="8" font-weight="600" fill="#06b6d4" text-anchor="middle" letter-spacing=".5">PYTHON</text>
      </g>
    </g>

    <!-- Center hub -->
    <g transform="translate(980, 170)" filter="url(#soft-glow)">
      <circle r="48" fill="url(#glow-cyan)" class="shim"/>
      <circle r="36" fill="#0a0f1c" stroke="#00D9FF" stroke-width="2"/>
      <circle r="32" fill="none" stroke="#00D9FF" stroke-width="1" opacity=".4"/>
      <text y="8" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#00D9FF" text-anchor="middle" letter-spacing="-1">RK</text>
    </g>

    <!-- Decorative corner brackets -->
    <g stroke="#1f2937" stroke-width="1.5" fill="none" opacity=".7">
      <path d="M 16 16 L 16 36 M 16 16 L 36 16"/>
      <path d="M 1184 16 L 1184 36 M 1184 16 L 1164 16"/>
      <path d="M 16 324 L 16 304 M 16 324 L 36 324"/>
      <path d="M 1184 324 L 1184 304 M 1184 324 L 1164 324"/>
    </g>

    <!-- Outer border -->
    <rect width="1200" height="340" rx="20" fill="none" stroke="#1f2937" stroke-width="1" opacity=".6"/>
  </g>
</svg>
